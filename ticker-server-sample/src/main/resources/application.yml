spring:
  application:
    name: ticker-server
  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics   # explicit; never env/configprops

ticker:
  server:
    enabled: true
  poll:
    interval: 3s          # snappy demo: DOWN after ~9s
  alert:
    enabled: true         # metric-threshold alerts active (no webhook -> fires log + /api/alerts/recent)
    metric-interval: 5s   # snappy demo; production default is 30s
  targets:
    - name: self
      type: SPRING
      url: http://localhost:8080      # the collector polls its own actuator -> UP
      tags: [collector]
    - name: down-demo
      type: HTTP
      url: http://localhost:9         # nothing listening -> FAILURE -> DOWN after threshold
      tags: [demo]
